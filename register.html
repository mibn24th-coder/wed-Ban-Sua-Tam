<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Đăng ký tài khoản</title>

    <link rel="stylesheet" href="css/bootstrap.min.css">

    <style>

        body {
            background: #f4fbf6;
            font-family: Arial, sans-serif;
        }

        .register-box {
            width: 380px;
            margin: 35px auto;
            background: white;
            padding: 28px;
            border-radius: 18px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            border: 2px solid #f8bbd0;
        }

            .register-box h2 {
                text-align: center;
                color: #ec407a;
                margin-bottom: 25px;
                font-weight: bold;
                font-size: 30px;
            }

        .form-group {
            margin-bottom: 16px;
        }

            .form-group label {
                display: block;
                margin-bottom: 6px;
                font-weight: bold;
                color: #444;
                font-size: 15px;
            }

        .form-control {
            width: 100%;
            height: 45px;
            border-radius: 10px;
            border: 1px solid #b2dfdb;
            padding-left: 12px;
            font-size: 14px;
        }

            .form-control:focus {
                border-color: #64b5f6;
                box-shadow: 0 0 8px rgba(100,181,246,0.4);
            }

        .btn-register {
            width: 100%;
            height: 45px;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: bold;
            color: white;
            background: linear-gradient(90deg,#f48fb1,#64b5f6);
            transition: 0.3s;
        }

            .btn-register:hover {
                background: linear-gradient(90deg,#ec407a,#42a5f5);
                transform: scale(1.02);
            }

        .login-link {
            text-align: center;
            margin-top: 18px;
            font-size: 15px;
        }

            .login-link a {
                text-decoration: none;
                color: #42a5f5;
                font-weight: bold;
            }
    </style>

</head>

<body>

    <div class="register-box">

        <h2>Đăng ký tài khoản</h2>

        <div class="form-group">
            <label>Họ và tên</label>

            <input type="text"
                   id="fullname"
                   class="form-control"
                   placeholder="Nhập họ và tên">
        </div>

        <div class="form-group">
            <label>Email</label>

            <input type="email"
                   id="email"
                   class="form-control"
                   placeholder="Nhập email">
        </div>

        <div class="form-group">
            <label>Tên đăng nhập</label>

            <input type="text"
                   id="username"
                   class="form-control"
                   placeholder="Nhập tên đăng nhập">
        </div>

        <div class="form-group">
            <label>Mật khẩu</label>

            <input type="password"
                   id="password"
                   class="form-control"
                   placeholder="Nhập mật khẩu">
        </div>

        <button class="btn-register"
                onclick="register()">

            Đăng ký

        </button>

        <div class="login-link">
            Đã có tài khoản?
            <a href="login.html">Đăng nhập</a>
        </div>

    </div>

    <script>

        function register() {
            var user = {
                fullname: document.getElementById("fullname").value,
                email: document.getElementById("email").value,
                username: document.getElementById("username").value,
                password: document.getElementById("password").value
            };

            if (!user.fullname || !user.email || !user.username || !user.password) {
                alert("Vui lòng nhập đầy đủ!");
                return;
            }

            // lưu danh sách user (nhiều tài khoản)
            var users = JSON.parse(localStorage.getItem("users")) || [];
            users.push(user);

            localStorage.setItem("users", JSON.stringify(users));

            alert("Đăng ký thành công!");
            window.location.href = "login.html";
        }

    </script>

</body>

</html>
