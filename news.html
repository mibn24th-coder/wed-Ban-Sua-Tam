<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nympha Blog - Tin Tức & Khuyến Mãi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --nympha-blue: #a3d8f4;
            --nympha-pink: #fbc2eb;
            --nympha-dark-pink: #f06292;
            --nympha-soft-bg: #f9fbfd;
            --header-bg-single: #ffc9d2;
            --nympha-text-header: #8a3a4d;
        }

        body {
            background-color: var(--nympha-soft-bg);
            font-family: 'Quicksand', sans-serif;
            color: #444;
        }

        .news-header {
            padding: 60px 0;
            background-color: var(--header-bg-single);
            border-radius: 0 0 50px 50px;
            margin-bottom: 40px;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .news-card {
            border: none;
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            background: #fff;
            height: 100%;
            display: flex;
            flex-direction: column;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

            .news-card:hover {
                transform: translateY(-10px);
                box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            }

        .img-container {
            width: 100%;
            height: 230px;
            overflow: hidden;
        }

        .news-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .news-card:hover .news-img {
            transform: scale(1.05);
        }

        .card-body {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .category-label {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.75rem;
            color: white;
            text-transform: uppercase;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .bg-km {
            background-color: var(--nympha-blue);
        }

        .bg-kt {
            background-color: var(--nympha-dark-pink);
        }

        .bg-rv {
            background-color: var(--nympha-pink);
        }

        .card-title {
            font-weight: 700;
            font-size: 1.15rem;
            margin-bottom: 10px;
            line-height: 1.4;
            color: #333;
        }

        .card-text {
            font-size: 0.9rem;
            color: #6c757d;
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.6;
        }

        .btn-nympha {
            border: 2px solid var(--nympha-blue);
            border-radius: 50px;
            padding: 7px 20px;
            font-weight: 600;
            color: #444;
            background: none;
            transition: 0.3s;
            font-size: 0.85rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

            .btn-nympha:hover {
                background: var(--nympha-blue);
                color: white;
            }

        /* Nút Mua ngay nổi bật hơn */
        .btn-buy {
            background-color: var(--nympha-dark-pink);
            border-color: var(--nympha-dark-pink);
            color: white;
        }

            .btn-buy:hover {
                background-color: #d81b60;
                border-color: #d81b60;
                color: white;
            }

        .modal-content {
            border-radius: 25px;
            border: none;
        }

        #modalFullContent {
            line-height: 1.8;
            font-size: 1.05rem;
            white-space: pre-line;
        }

        #modalImg {
            width: 60% !important;
            margin: 0 auto;
            display: block;
        }
    </style>
</head>
<body>

    <header class="news-header text-center shadow-sm">
        <div class="container">
            <h1 class="fw-bold" style="color: var(--nympha-text-header); letter-spacing: 1.5px;">TIN TỨC MỚI NHẤT</h1>
            <p style="color: #6d4c54; font-weight: 600;">Cập nhật xu hướng làm đẹp và ưu đãi từ Nympha</p>
        </div>
    </header>

    <div class="container mb-5">
        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" id="webNewsDisplay"></div>
    </div>

    <div class="modal fade" id="newsModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content shadow p-2">
                <div class="modal-header border-0">
                    <h4 class="modal-title fw-bold" id="modalTitle"></h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <img src="" id="modalImg" class="img-fluid w-100 mb-3" style="border-radius: 15px;" alt="Nympha">
                    <div id="modalFullContent"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const displayArea = document.getElementById('webNewsDisplay');
            const newsList = JSON.parse(localStorage.getItem('newsList') || "[]");

            if (newsList.length === 0) {
                displayArea.innerHTML = `<div class="col-12 text-center py-5"><h4 class="text-muted">Hiện chưa có tin tức nào.</h4></div>`;
                return;
            }

            displayArea.innerHTML = "";

            newsList.forEach((item, index) => {
                let imgPath = item.picture ? item.picture.trim() : "";
                let displayImg = (imgPath.startsWith('http') || imgPath.startsWith('file:///'))
                    ? imgPath : 'img/' + imgPath;

                let categoryText = "";
                let badgeClass = 'bg-secondary';
                const catValue = (item.category || "").toUpperCase();

                if (catValue === 'KM') {
                    categoryText = 'Khuyến mãi';
                    badgeClass = 'bg-km';
                } else if (catValue === 'KT') {
                    categoryText = 'Kiến thức chăm sóc da';
                    badgeClass = 'bg-kt';
                } else if (catValue === 'RV') {
                    categoryText = 'Review sản phẩm';
                    badgeClass = 'bg-rv';
                } else {
                    categoryText = item.category || "Tin tức";
                }

                const newsHtml = `
                        <div class="col d-flex align-items-stretch">
                            <div class="card news-card w-100">
                                <div class="img-container">
                                    <img src="${displayImg}" class="news-img" onerror="this.src='https://via.placeholder.com/400x250?text=Nympha+News'">
                                </div>
                                <div class="card-body d-flex flex-column">
                                    <div><span class="category-label ${badgeClass}">${categoryText}</span></div>
                                    <h5 class="card-title">${item.title}</h5>
                                    <div class="card-text flex-grow-1">${item.summary}</div>

                                    <div class="mt-auto pt-3 border-top">
                                        <div class="d-flex gap-2 mb-2">
                                            <button class="btn-nympha flex-fill" onclick="showDetail(${index})">Xem chi tiết</button>
                                            <a href="product.html" class="btn-nympha btn-buy flex-fill">Mua ngay</a>
                                        </div>
                                        <div class="text-end">
                                            <small class="text-muted" style="font-style: italic;">Bởi Nympha</small>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                displayArea.innerHTML += newsHtml;
            });
        });

        function showDetail(index) {
            const newsList = JSON.parse(localStorage.getItem('newsList') || "[]");
            const item = newsList[index];
            if (!item) return;

            let imgPath = item.picture ? item.picture.trim() : "";
            let displayImg = (imgPath.startsWith('http') || imgPath.startsWith('file:///'))
                ? imgPath : 'img/' + imgPath;

            document.getElementById('modalTitle').innerText = item.title;
            document.getElementById('modalImg').src = displayImg;

            // Nội dung chi tiết + nút Mua ngay lớn ở cuối Modal
            const detailContent = item.detail || item.summary;
            const buyButtonHtml = `
                    <div class="text-center mt-4 mb-3">
                        <hr>
                        <p class="text-muted small">Yêu thích sản phẩm này? Đừng bỏ lỡ ưu đãi!</p>
                        <a href="product.html" class="btn-nympha btn-buy px-5 py-2 fs-6">SẮM NGAY SẢN PHẨM</a>
                    </div>
                `;

            document.getElementById('modalFullContent').innerHTML = detailContent + buyButtonHtml;

            const modalElement = document.getElementById('newsModal');
            const modal = new bootstrap.Modal(modalElement);
            modal.show();
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
