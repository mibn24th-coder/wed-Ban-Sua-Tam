<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập Palmolive</title>

    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">

    <style>
        body {
            background: #ffffff;
            font-family: Arial, sans-serif;
        }

        .login-box {
            width: 400px;
            margin: 80px auto;
            background: #ffffff;
            padding: 40px;
            border-radius: 18px;
            box-shadow: 0 0 25px rgba(0,0,0,0.08);
            border: 2px solid #f8bbd0;
        }

            .login-box h2 {
                text-align: center;
                margin-bottom: 30px;
                color: #ec407a;
                font-weight: bold;
            }

        .form-control {
            margin-bottom: 20px;
            height: 50px;
            border-radius: 10px;
            border: 1px solid #90caf9;
            padding-left: 15px;
            transition: 0.3s;
        }

            .form-control:focus {
                border-color: #64b5f6;
                box-shadow: 0 0 8px rgba(100,181,246,0.4);
            }

        .btn-login {
            width: 100%;
            background: linear-gradient(90deg, #f48fb1, #64b5f6);
            border: none;
            height: 50px;
            color: white;
            font-size: 18px;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
        }

            .btn-login:hover {
                background: linear-gradient(90deg, #ec407a, #42a5f5);
                transform: scale(1.02);
            }

        ::placeholder {
            color: #b0bec5;
        }
    </style>
</head>

<body>

    <div class="login-box">

        <h2>Đăng nhập</h2>

        <input type="text" id="username" class="form-control" placeholder="Tên đăng nhập">

        <input type="password" id="password" class="form-control" placeholder="Mật khẩu">

        <button class="btn-login" onclick="login()">
            Đăng nhập
        </button>

    </div>

    <script>

        function login() {

            var username = document.getElementById("username").value;
            var password = document.getElementById("password").value;

            var users = JSON.parse(localStorage.getItem("users")) || [];

            var foundUser = users.find(u =>
                (u.username === username || u.email === username)
                && u.password === password
            );

            if (!foundUser) {
                alert("Sai tài khoản hoặc mật khẩu!");
                return;
            }

            // lưu session đăng nhập
            sessionStorage.setItem("isLogin", "true");
            sessionStorage.setItem("currentUser", JSON.stringify(foundUser));

            alert("Đăng nhập thành công!");
            window.location.href = "index.html";
        }
        function logout() {
            sessionStorage.removeItem("isLogin");
            alert("Đăng xuất thành công!");
            window.location.href = "login.html";
        }
    </script>
    
</body>
</html>
